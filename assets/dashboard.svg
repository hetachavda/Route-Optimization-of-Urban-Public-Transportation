<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#184f95"/>
      <stop offset="100%" stop-color="#2a78d6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="#f9f9f7"/>

  <!-- header -->
  <rect x="0" y="0" width="1200" height="86" fill="url(#head)"/>
  <text x="30" y="42" font-size="26" font-weight="700" fill="#ffffff">Route Optimization Dashboard</text>
  <text x="30" y="70" font-size="15" fill="#cde2fb">Mixed Integer Programming · 5-stop network · 3-bus fleet · Google OR-Tools</text>

  <!-- KPI tiles -->
  <rect x="30" y="110" width="360" height="110" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="30" y="110" width="6" height="110" rx="3" fill="#2a78d6"/>
  <text x="58" y="148" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">NETWORK STOPS</text>
  <text x="56" y="198" font-size="46" font-weight="700" fill="#0b0b0b">5</text>

  <rect x="420" y="110" width="360" height="110" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="420" y="110" width="6" height="110" rx="3" fill="#1baf7a"/>
  <text x="448" y="148" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">BUSES ALLOCATED</text>
  <text x="446" y="198" font-size="46" font-weight="700" fill="#0b0b0b">3</text>

  <rect x="810" y="110" width="360" height="110" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <rect x="810" y="110" width="6" height="110" rx="3" fill="#eda100"/>
  <text x="838" y="148" font-size="14" font-weight="600" fill="#898781" letter-spacing="1">OPTIMIZATION MODEL</text>
  <text x="836" y="198" font-size="46" font-weight="700" fill="#0b0b0b">MIP</text>

  <!-- Network diagram panel -->
  <rect x="30" y="250" width="560" height="330" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="48" cy="282" r="5" fill="#2a78d6"/>
  <text x="62" y="287" font-size="16" font-weight="700" fill="#0b0b0b">Optimized Bus-to-Route Assignment</text>

  <!-- edges -->
  <g stroke-linecap="round" fill="none">
    <line x1="130" y1="470" x2="250" y2="350" stroke="#2a78d6" stroke-width="4"/>
    <line x1="250" y1="350" x2="400" y2="330" stroke="#1baf7a" stroke-width="4"/>
    <line x1="400" y1="330" x2="500" y2="450" stroke="#eda100" stroke-width="4"/>
    <line x1="130" y1="470" x2="320" y2="520" stroke="#4a3aa7" stroke-width="3" stroke-dasharray="6 6" opacity="0.7"/>
    <line x1="320" y1="520" x2="500" y2="450" stroke="#4a3aa7" stroke-width="3" stroke-dasharray="6 6" opacity="0.7"/>
  </g>
  <!-- nodes -->
  <g>
    <circle cx="130" cy="470" r="20" fill="#2a78d6"/><text x="130" y="475" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">S1</text>
    <circle cx="250" cy="350" r="20" fill="#1baf7a"/><text x="250" y="355" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">S2</text>
    <circle cx="400" cy="330" r="20" fill="#eda100"/><text x="400" y="335" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">S3</text>
    <circle cx="500" cy="450" r="20" fill="#e34948"/><text x="500" y="455" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">S4</text>
    <circle cx="320" cy="520" r="20" fill="#4a3aa7"/><text x="320" y="525" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">S5</text>
  </g>
  <!-- bus labels -->
  <g font-size="11" font-weight="600" fill="#52514e">
    <text x="182" y="405" text-anchor="middle">Bus 1</text>
    <text x="325" y="330" text-anchor="middle">Bus 2</text>
    <text x="458" y="385" text-anchor="middle">Bus 3</text>
  </g>
  <text x="50" y="558" font-size="11" fill="#898781">Solved assignment over the inter-stop cost matrix — illustrative synthetic network</text>

  <!-- Before/After panel -->
  <rect x="615" y="250" width="555" height="330" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="633" cy="282" r="5" fill="#1baf7a"/>
  <text x="647" y="287" font-size="16" font-weight="700" fill="#0b0b0b">Baseline vs Optimized</text>

  <!-- legend -->
  <rect x="905" y="272" width="14" height="14" rx="3" fill="#c3c2b7"/>
  <text x="924" y="284" font-size="12" fill="#52514e">Baseline</text>
  <rect x="1010" y="272" width="14" height="14" rx="3" fill="#1baf7a"/>
  <text x="1029" y="284" font-size="12" fill="#52514e">Optimized</text>

  <line x1="690" y1="500" x2="1140" y2="500" stroke="#c3c2b7" stroke-width="1.5"/>

  <!-- Group 1: Avg Wait Time -->
  <rect x="740" y="340" width="60" height="160" rx="4" fill="#c3c2b7"/>
  <text x="770" y="332" font-size="12" font-weight="600" fill="#52514e" text-anchor="middle">100%</text>
  <rect x="808" y="404" width="60" height="96" rx="4" fill="#1baf7a"/>
  <text x="838" y="396" font-size="12" font-weight="700" fill="#0e7a55" text-anchor="middle">~60%</text>
  <text x="804" y="522" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Avg Wait Time</text>

  <!-- Group 2: Operating Cost -->
  <rect x="960" y="360" width="60" height="140" rx="4" fill="#c3c2b7"/>
  <text x="990" y="352" font-size="12" font-weight="600" fill="#52514e" text-anchor="middle">100%</text>
  <rect x="1028" y="420" width="60" height="80" rx="4" fill="#2a78d6"/>
  <text x="1058" y="412" font-size="12" font-weight="700" fill="#184f95" text-anchor="middle">~72%</text>
  <text x="1024" y="522" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Operating Cost</text>

  <text x="690" y="558" font-size="11" fill="#898781">Relative index vs manual baseline — representative of the synthetic scenario</text>

  <!-- Bottom: objective breakdown -->
  <rect x="30" y="600" width="1140" height="130" rx="10" fill="#ffffff" stroke="rgba(11,11,11,0.10)"/>
  <circle cx="48" cy="632" r="5" fill="#eda100"/>
  <text x="62" y="637" font-size="16" font-weight="700" fill="#0b0b0b">Model Constraints Enforced</text>

  <g font-size="13" fill="#0b0b0b">
    <rect x="45" y="656" width="210" height="52" rx="8" fill="#eef4fc"/>
    <text x="60" y="680" font-size="12" font-weight="700" fill="#2a78d6">Demand satisfaction</text>
    <text x="60" y="698" font-size="11" fill="#52514e">Every stop served</text>

    <rect x="270" y="656" width="210" height="52" rx="8" fill="#e9f7f1"/>
    <text x="285" y="680" font-size="12" font-weight="700" fill="#1baf7a">Fleet limit</text>
    <text x="285" y="698" font-size="11" fill="#52514e">≤ 3 buses available</text>

    <rect x="495" y="656" width="210" height="52" rx="8" fill="#fdf4e0"/>
    <text x="510" y="680" font-size="12" font-weight="700" fill="#b97c00">Travel time</text>
    <text x="510" y="698" font-size="11" fill="#52514e">Congestion-aware</text>

    <rect x="720" y="656" width="210" height="52" rx="8" fill="#fdeceb"/>
    <text x="735" y="680" font-size="12" font-weight="700" fill="#e34948">Emission cap</text>
    <text x="735" y="698" font-size="11" fill="#52514e">Sustainability limit</text>

    <rect x="945" y="656" width="200" height="52" rx="8" fill="#efeafb"/>
    <text x="960" y="680" font-size="12" font-weight="700" fill="#4a3aa7">Arrival times Y_ij</text>
    <text x="960" y="698" font-size="11" fill="#52514e">Scheduled per stop</text>
  </g>

  <!-- footer -->
  <text x="1170" y="748" font-size="12" fill="#898781" text-anchor="end">Heta Chavda · Data Analytics Portfolio</text>
</svg>
