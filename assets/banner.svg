<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eda100"/>
      <stop offset="100%" stop-color="#1baf7a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <g stroke="#3a5a68" stroke-width="1" opacity="0.25">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- route-network motif: connected nodes with draw-in edges + pop-in stops -->
  <g filter="url(#glow)">
    <!-- edges draw in -->
    <g stroke-linecap="round" fill="none">
      <line x1="840" y1="230" x2="930" y2="120" stroke="#5598e7" stroke-width="3" stroke-dasharray="150" stroke-dashoffset="150">
        <animate attributeName="stroke-dashoffset" from="150" to="0" begin="0.3s" dur="0.7s" fill="freeze"/>
      </line>
      <line x1="930" y1="120" x2="1030" y2="200" stroke="#1baf7a" stroke-width="3" stroke-dasharray="150" stroke-dashoffset="150">
        <animate attributeName="stroke-dashoffset" from="150" to="0" begin="0.6s" dur="0.7s" fill="freeze"/>
      </line>
      <line x1="1030" y1="200" x2="1110" y2="95" stroke="#eda100" stroke-width="3" stroke-dasharray="150" stroke-dashoffset="150">
        <animate attributeName="stroke-dashoffset" from="150" to="0" begin="0.9s" dur="0.7s" fill="freeze"/>
      </line>
      <line x1="840" y1="230" x2="1030" y2="200" stroke="#4a3aa7" stroke-width="2.5" stroke-dasharray="220" stroke-dashoffset="220" opacity="0.8">
        <animate attributeName="stroke-dashoffset" from="220" to="0" begin="1.2s" dur="0.9s" fill="freeze"/>
      </line>
    </g>
    <!-- stops pop in -->
    <g>
      <circle cx="840" cy="230" r="0" fill="#5598e7" stroke="#ffffff" stroke-width="2">
        <animate attributeName="r" values="0;13;11" begin="0.3s" dur="0.5s" fill="freeze"/>
      </circle>
      <circle cx="930" cy="120" r="0" fill="#1baf7a" stroke="#ffffff" stroke-width="2">
        <animate attributeName="r" values="0;13;11" begin="0.6s" dur="0.5s" fill="freeze"/>
      </circle>
      <circle cx="1030" cy="200" r="0" fill="#eda100" stroke="#ffffff" stroke-width="2">
        <animate attributeName="r" values="0;13;11" begin="0.9s" dur="0.5s" fill="freeze"/>
      </circle>
      <circle cx="1110" cy="95" r="0" fill="#e34948" stroke="#ffffff" stroke-width="2">
        <animate attributeName="r" values="0;13;11" begin="1.2s" dur="0.5s" fill="freeze"/>
      </circle>
    </g>
    <!-- moving bus pulse along route -->
    <circle r="6" fill="#ffffff">
      <animateMotion dur="3s" begin="1.6s" repeatCount="indefinite" path="M840,230 L930,120 L1030,200 L1110,95"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="70" y="96" width="8" height="128" rx="4" fill="url(#accent)"/>
  <text x="105" y="128" font-size="44" font-weight="700" fill="#ffffff">Route Optimization</text>
  <text x="105" y="172" font-size="23" font-weight="400" fill="#a8e6cf">Urban Public Transportation — Bus Scheduling &amp; Routing</text>

  <g font-size="16" font-weight="600">
    <rect x="105" y="200" width="150" height="34" rx="17" fill="#eda100" opacity="0.9"/>
    <text x="180" y="223" fill="#0b0b0b" text-anchor="middle">5 Stops · 3 Buses</text>
    <rect x="267" y="200" width="160" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="347" y="223" fill="#cfeefc" text-anchor="middle">MIP Optimization</text>
    <rect x="439" y="200" width="160" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="519" y="223" fill="#cfeefc" text-anchor="middle">Google OR-Tools</text>
  </g>

  <text x="105" y="285" font-size="15" fill="#7fa9bd">Python · OR-Tools · NetworkX   |   Heta Chavda — Data Analytics Portfolio</text>

  <rect x="-260" y="0" width="260" height="320" fill="url(#shine)" transform="skewX(-20)">
    <animate attributeName="x" from="-260" to="1300" dur="4.5s" begin="1.6s" repeatCount="indefinite"/>
  </rect>
</svg>
